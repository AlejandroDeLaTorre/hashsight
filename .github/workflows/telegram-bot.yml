name: Telegram Hashprice Bot

on:
  schedule:
    - cron: '0 9 * * *'     # runs daily at 09:00 UTC
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Save hashprice snapshot to database
        run: |
          curl -s -X GET https://stratumv2.com/api/snapshot \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Check for difficulty adjustment
        run: |
          curl -s -X GET https://stratumv2.com/api/difficulty-alert \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  weekly-recap:
    runs-on: ubuntu-latest
    needs: snapshot
    steps:
      - name: Post weekly recap on Mondays only
        run: |
          DAY=$(date +%u)  # 1=Monday ... 7=Sunday
          if [ "$DAY" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Monday or manual trigger — posting recap"
            RESPONSE=$(curl -s -X GET https://stratumv2.com/api/cron \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
            echo "API Response: $RESPONSE"
          else
            echo "Not Monday (day=$DAY) — skipping Telegram post"
          fi
