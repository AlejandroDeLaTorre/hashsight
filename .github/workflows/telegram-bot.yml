name: Telegram Weekly Recap

on:
  schedule:
    - cron: '0 9 * * 1'     # Monday 09:00 UTC only
  workflow_dispatch:

jobs:
  weekly-recap:
    runs-on: ubuntu-latest
    steps:
      - name: Post weekly recap to Telegram
        run: |
          RESPONSE=$(curl -s -X GET https://stratumv2.com/api/cron \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "API Response: $RESPONSE"
